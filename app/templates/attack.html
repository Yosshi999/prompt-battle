{% extends "base.html" %}
{% block content %}
<h2>Attack</h2>
<p>Round {{ phase.round_no }} ({{ phase.state }})</p>
<form method="post" action="/attack">
  <label>Target:
    <select name="target_user_id">
      {% for t in targets %}
        <option value="{{ t.id }}" {% if target_user_id == t.id %}selected{% endif %}>{{ t.username }}</option>
      {% endfor %}
    </select>
  </label><br/>
  <textarea name="user_prompt" rows="8" cols="100">{{ last_prompt or '' }}</textarea><br/>
  <button type="submit">送信</button>
</form>
{% if result %}
  <h3>応答</h3>
  <pre>{{ result }}</pre>
{% endif %}
{% endblock %}
